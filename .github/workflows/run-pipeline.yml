# Run UFC fight prediction pipeline every Sunday morning
# Uses Azure Key Vault for secrets

name: Run pipeline

on:
  schedule:
    # Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run UFC pipeline
        run: python run_pipeline.py --quick --storage azure

      - name: Upload predictions artifact
        uses: actions/upload-artifact@v4
        with:
          name: upcoming_predictions
          path: module_07_predict/output/
          if-no-files-found: warn
