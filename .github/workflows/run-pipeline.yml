# Run UFC fight prediction pipeline every Sunday morning
# Requires repository secret: AZURE_STORAGE_CONNECTION_STRING
name: Run pipeline

on:
  schedule:
    # Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:  # Allow manual run from Actions tab

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (quick, local + Azure)
        run: python run_pipeline.py --quick --storage both

      - name: Upload predictions
        uses: actions/upload-artifact@v4
        with:
          name: upcoming_predictions
          path: module_07_predict/output/
          if-no-files-found: warn
